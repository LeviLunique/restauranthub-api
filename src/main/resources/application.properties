# Application Configuration
spring.application.name=restaurant-user-api

# Server Configuration
server.port=${SERVER_PORT:8080}

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.restauranthub.restaurant_user_api.controllers
springdoc.paths-to-match=/api/**

# Security / JWT Configuration
security.jwt.secret=${JWT_SECRET:ZmFrZS1qd3Qtc2VjcmV0LXNob3VsZC1iZS1sb25nLWVuY29kZWQ=}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restauranthubdb}
spring.datasource.username=${DB_USER:restauranthub}
spring.datasource.password=${DB_PASSWORD:restaurantpwd}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.example.restaurantuserapi=DEBUG
