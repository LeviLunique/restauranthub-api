services:
  db:
    image: postgres:15-alpine
    container_name: restauranthub-db
    environment:
      POSTGRES_DB: ${DB_NAME:-restauranthubdb}
      POSTGRES_USER: ${DB_USER:-restauranthub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-restaurantpwd}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - restauranthub-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-restauranthub} -d ${DB_NAME:-restauranthubdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restauranthub-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-restauranthubdb}
      DB_USER: ${DB_USER:-restauranthub}
      DB_PASSWORD: ${DB_PASSWORD:-restaurantpwd}
      SERVER_PORT: ${SERVER_PORT:-8080}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - restauranthub-network

volumes:
  postgres_data:


networks:
  restauranthub-network:
    driver: bridge
